apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qard-postgres
spec:
  serviceName: qard-postgres
  replicas: 1
  selector:
    matchLabels:
      app: qard-postgres
  template:
    metadata:
      labels:
        app: qard-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: qard
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qard-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qard-postgres
spec:
  selector:
    app: qard-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
