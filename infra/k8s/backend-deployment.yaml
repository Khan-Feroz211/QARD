apiVersion: apps/v1
kind: Deployment
metadata:
  name: qard-backend
  labels:
    app: qard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qard-backend
  template:
    metadata:
      labels:
        app: qard-backend
    spec:
      containers:
        - name: backend
          image: qard/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: qard-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: qard-backend-svc
spec:
  selector:
    app: qard-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
